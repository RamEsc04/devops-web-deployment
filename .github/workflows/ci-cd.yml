name: CI/CD - Web Deployment

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  ci:
    name: CI - Validate and Build
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Validar sintaxis de Python
        run: |
          python -m py_compile app/app.py

      - name: Ejecutar pruebas automatizadas
        run: |
          pytest -v

      - name: Validar construcción de imagen Docker
        run: |
          docker build \
            -t devops-web-deployment:ci-${{ github.run_number }} \
            -f docker/Dockerfile \
            .

      - name: Mostrar imagen creada
        run: |
          docker images devops-web-deployment

  deploy:
    name: CD - Deploy to Local Minikube
    needs: ci

    # El despliegue solo ocurre al ejecutar manualmente el workflow.
    if: github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ inputs.environment }}

    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    runs-on:
      - self-hosted
      - linux
      - x64

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Definir variables del ambiente
        shell: bash
        run: |
          ENVIRONMENT="${{ inputs.environment }}"

          echo "ENVIRONMENT=$ENVIRONMENT" >> "$GITHUB_ENV"
          echo "NAMESPACE=web-$ENVIRONMENT" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=devops-web-deployment" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$ENVIRONMENT-${{ github.run_number }}" >> "$GITHUB_ENV"

          case "$ENVIRONMENT" in
            dev)
              echo "NODE_PORT=30081" >> "$GITHUB_ENV"
              ;;
            qa)
              echo "NODE_PORT=30082" >> "$GITHUB_ENV"
              ;;
            prod)
              echo "NODE_PORT=30083" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Ambiente no válido: $ENVIRONMENT"
              exit 1
              ;;
          esac

      - name: Mostrar configuración
        run: |
          echo "Ambiente: $ENVIRONMENT"
          echo "Namespace: $NAMESPACE"
          echo "Imagen: $IMAGE_NAME:$IMAGE_TAG"
          echo "NodePort: $NODE_PORT"

      - name: Verificar herramientas
        run: |
          docker --version
          kubectl version --client
          minikube version
          minikube status
          kubectl get nodes

      - name: Crear namespace
        run: |
          kubectl create namespace "$NAMESPACE" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Construir imagen Docker para despliegue
        run: |
          docker build \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -f docker/Dockerfile \
            .

      - name: Cargar imagen en Minikube
        run: |
          minikube image load "$IMAGE_NAME:$IMAGE_TAG"

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply \
            -f "k8s/$ENVIRONMENT/deployment.yaml"

          kubectl apply \
            -f "k8s/$ENVIRONMENT/service.yaml"

      - name: Actualizar imagen del Deployment
        run: |
          kubectl set image \
            deployment/devops-web-deployment \
            web="$IMAGE_NAME:$IMAGE_TAG" \
            -n "$NAMESPACE"

      - name: Verificar rollout
        run: |
          kubectl rollout status \
            deployment/devops-web-deployment \
            -n "$NAMESPACE" \
            --timeout=120s

      - name: Mostrar recursos
        run: |
          kubectl get deployments -n "$NAMESPACE"
          kubectl get pods -n "$NAMESPACE"
          kubectl get services -n "$NAMESPACE"

      - name: Probar health check
        run: |
          URL="http://$(minikube ip):$NODE_PORT"

          echo "Probando $URL/health"

          for intento in 1 2 3 4 5; do
            if curl --fail --silent "$URL/health"; then
              echo
              echo "Health check correcto"
              exit 0
            fi

            echo "Intento $intento fallido. Esperando..."
            sleep 5
          done

          echo "La aplicación no respondió correctamente"
          exit 1

      - name: Mostrar URL
        run: |
          echo "Aplicación desplegada en Minikube:"
          echo "http://$(minikube ip):$NODE_PORT"

          echo "IP de la VM:"
          hostname -I
