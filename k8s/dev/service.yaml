apiVersion: v1
kind: Service
metadata:
  name: devops-web-service
  namespace: web-dev
  labels:
    environment: dev
spec:
  type: NodePort
  selector:
    app: devops-web
    environment: dev
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30081
