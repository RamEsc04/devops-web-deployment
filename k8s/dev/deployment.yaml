apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-web-deployment
  namespace: web-dev
  labels:
    app: devops-web
    environment: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: devops-web
      environment: dev

  template:
    metadata:
      labels:
        app: devops-web
        environment: dev

    spec:
      containers:
        - name: web
          image: devops-web-deployment:dev
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: APP_ENV
              value: "dev"
            - name: APP_VERSION
              value: "1.0.0-dev"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
