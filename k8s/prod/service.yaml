apiVersion: v1
kind: Service
metadata:
  name: devops-web-service
  namespace: web-prod
  labels:
    environment: prod
spec:
  type: NodePort
  selector:
    app: devops-web
    environment: prod
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30083
