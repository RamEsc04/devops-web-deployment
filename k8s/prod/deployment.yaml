apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-web-deployment
  namespace: web-prod
  labels:
    app: devops-web
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-web
      environment: prod
  template:
    metadata:
      labels:
        app: devops-web
        environment: prod
    spec:
      containers:
        - name: web
          image: devops-web-deployment:prod
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
